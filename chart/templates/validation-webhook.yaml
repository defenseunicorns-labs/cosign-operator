apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ .Values.uuid }}
webhooks:
  - admissionReviewVersions:
      - v1
      - v1beta1
    clientConfig:
      caBundle: >-
        
      service:
        name: {{ .Values.uuid }}
        namespace: pepr-system
        path: >-
          /validate/4ff65e869a3aa07640de85fc1b8d48c5b3b153b75282b58327dc72248c25fa90
    failurePolicy: {{ .Values.admission.failurePolicy }}
    matchPolicy: Equivalent
    name: {{ .Values.uuid }}.pepr.dev
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - pepr-system
            {{- range .Values.additionalIgnoredNamespaces }}
            - {{ . }}
            {{- end }}
            - pepr-system
            - kube-sytem
            - istio-system
            - zarf
    rules:
      - apiGroups:
          - ''
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
          - pods/ephemeralcontainers
      - apiGroups:
          - policy.uds.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
        resources:
          - signatureenforcements
      - apiGroups:
          - policy.uds.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
        resources:
          - sbomenforcements
    sideEffects: None
    timeoutSeconds: 10
