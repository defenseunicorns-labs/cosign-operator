name: CI

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: cd policy && npm i

      - name: Run Go tests
        run: go test $(go list ./... | grep -v '/node_modules/')

      - name: Run policy unit tests
        run: cd policy && npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xz crane
          sudo mv crane /usr/local/bin/

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Zarf
        uses: zarf-dev/setup-zarf@10e539efed02f75ec39eb8823e22a5c795f492ae #v1.0.1
        with:
          download-init-package: true

      - name: Install UDS CLI
        run: |
          UDS_VERSION=v0.30.1
          curl -fL "https://github.com/defenseunicorns/uds-cli/releases/download/${UDS_VERSION}/uds-cli_${UDS_VERSION}_Linux_amd64" -o uds
          chmod +x uds
          ./uds version
          sudo mv uds /usr/local/bin/

      - name: Install dependencies
        run: cd policy && npm ci && cd .. && npm ci

      - name: Generate cosign keys
        run: COSIGN_PASSWORD="" cosign generate-key-pair

      - name: Build transform CLI
        run: go build -trimpath -ldflags="-s -w" -o bin/transform ./cmd/transform

      - name: Login to UDS Registry 
        run: |
          zarf tools registry login \
            --username "${{ secrets.UDS_REGISTRY_USERNAME }}" \
            --password "${{ secrets.UDS_REGISTRY_PASSWORD }}" \
            registry.defenseunicorns.com

      - name: install-oras
        env:
          ORAS_VERSION: v1.3.2
          ARCH: amd64
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          curl -fsSL \
            "https://github.com/oras-project/oras/releases/download/${ORAS_VERSION}/oras_${ORAS_VERSION#v}_${OS}_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin oras
          chmod +x /usr/local/bin/oras
          zarf tools registry login \
            --username "${{ secrets.UDS_REGISTRY_USERNAME }}" \
            --password "${{ secrets.UDS_REGISTRY_PASSWORD }}" \
            registry.defenseunicorns.com
          oras pull registry.defenseunicorns.com/navy-canes/controller:v1.2.2

      - name: Build policy and Zarf package
        run: |
          uds run build-policy
          uds run create-package

      - name: Create UDS bundle
        run: uds run create-bundle

      - name: Create k3d cluster
        run: k3d cluster create

      - name: Wait for nodes ready
        run: kubectl wait --for=condition=Ready nodes --all --timeout=360s

      - name: Deploy UDS bundle
        run: uds run deploy-bundle

      - name: Setup e2e
        run: uds run setup-e2e

      - name: Run e2e tests
        run: uds run test-e2e

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "::group::Nodes"
          kubectl get nodes -o wide
          echo "::endgroup::"
          echo "::group::Pods (all namespaces)"
          kubectl get pods -A -o wide
          echo "::endgroup::"
          echo "::group::Operator workloads"
          kubectl describe deploy -n pepr-system || true
          kubectl describe daemonset -n pepr-system || true
          kubectl get pods -n pepr-system -o wide || true
          echo "::endgroup::"
          echo "::group::e2e-signed-app deployments"
          for ns in e2e-no-policy e2e-sig-enforce e2e-sbom-mutate; do
            echo "--- namespace: $ns ---"
            kubectl describe deploy/e2e-signed-app -n "$ns" || true
            kubectl get pods -n "$ns" -o wide || true
          done
          echo "::endgroup::"
          echo "::group::Recent events"
          kubectl get events -A --sort-by=.lastTimestamp | tail -80
          echo "::endgroup::"
