apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ .Values.uuid }}
  {{- if .Values.admission.webhookAnnotations }}
  annotations:
    {{- toYaml .Values.admission.webhookAnnotations | nindent 4 }}
  {{- end }}
  {{- if .Values.admission.webhookLabels }}
  labels:
    {{- toYaml .Values.admission.webhookLabels | nindent 4 }}
  {{- end }}
webhooks:
  - admissionReviewVersions:
      - v1
      - v1beta1
    clientConfig:
      caBundle: >-
        
      service:
        name: {{ .Values.uuid }}
        namespace: pepr-system
        path: >-
          /validate/164d4f5f57d949e2fc18b8a5b5523348967b110529da2d3e5c1854f7af0bdaf3
    failurePolicy: {{ .Values.admission.failurePolicy }}
    matchPolicy: Equivalent
    name: {{ .Values.uuid }}.pepr.dev
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - pepr-system
            {{- range .Values.additionalIgnoredNamespaces }}
            - {{ . }}
            {{- end }}
            - pepr-system
            - kube-sytem
            - istio-system
            - zarf
    rules:
      - apiGroups:
          - ''
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
          - pods/ephemeralcontainers
      - apiGroups:
          - policy.uds.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
        resources:
          - signatureenforcements
      - apiGroups:
          - policy.uds.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
        resources:
          - sbomenforcements
    sideEffects: None
    timeoutSeconds: 10
