name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  # ---------------------------------------------------------------------------
  # release-please creates/updates a release PR with changelog, and when
  # that PR is merged it creates a GitHub Release + git tag.
  # ---------------------------------------------------------------------------
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ---------------------------------------------------------------------------
  # After release-please creates a release, build CLI artifacts and attach them
  # to the GitHub Release.
  # ---------------------------------------------------------------------------
  release-cli:
    name: Release transform CLI
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test $(go list ./... | grep -v '/node_modules/')

      - name: Build CLI archives
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            name="transform_${VERSION}_${os}_${arch}"
            binary="transform"
            if [ "$os" = "windows" ]; then
              binary="transform.exe"
            fi

            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build \
              -trimpath -ldflags="-s -w" \
              -o "dist/${binary}" ./cmd/transform

            if [ "$os" = "windows" ]; then
              (cd dist && zip "${name}.zip" "${binary}")
            else
              (cd dist && tar -czf "${name}.tar.gz" "${binary}")
            fi
            rm "dist/${binary}"
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Upload CLI artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --clobber

  # ---------------------------------------------------------------------------
  # After release-please creates a release, build and push to GHCR.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Zarf
        uses: zarf-dev/setup-zarf@10e539efed02f75ec39eb8823e22a5c795f492ae #v1.0.1

      - name: install-oras
        env:
          ORAS_VERSION: v1.3.2
          ARCH: amd64
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          curl -fsSL \
            "https://github.com/oras-project/oras/releases/download/${ORAS_VERSION}/oras_${ORAS_VERSION#v}_${OS}_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin oras
          chmod +x /usr/local/bin/oras
          zarf tools registry login \
            --username "${{ secrets.UDS_REGISTRY_USERNAME }}" \
            --password "${{ secrets.UDS_REGISTRY_PASSWORD }}" \
            registry.defenseunicorns.com
          oras pull registry.defenseunicorns.com/navy-canes/controller:v1.2.2

      - name: Build policy and transform chart
        run: |
          cd policy && npm ci
          cd ..
          npm ci
          npm install -g pepr@1.2.2
          go build -trimpath -ldflags="-s -w" -o bin/transform ./cmd/transform
          make build-policy
          ./bin/transform -input chart/templates/admission-deployment.yaml

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | zarf tools registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Render zarf.yaml with release version
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          envsubst < zarf.yaml.tmpl.release > zarf.yaml
          cat zarf.yaml

      - name: Create Zarf package
        run: |
          zarf package create . --confirm

      - name: Publish Zarf package to GHCR
        run: |
          zarf package publish zarf-package-*.tar.zst \
            oci://ghcr.io/${{ github.repository_owner }} \
            --oci-concurrency 6
