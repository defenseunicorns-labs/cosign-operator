        - 'ALL'
  nodeSelector: {}
  tolerations: []
  extraVolumeMounts: []
  extraVolumes: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  serviceMonitor:
    enabled: false
    labels: {}
    annotations: {}
