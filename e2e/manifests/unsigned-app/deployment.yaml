apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-unsigned-app
  namespace: ###ZARF_VAR_NAMESPACE###
spec:
  replicas: 1
  selector:
    matchLabels:
      app: e2e-unsigned-app
  template:
    metadata:
      labels:
        app: e2e-unsigned-app
    spec:
      containers:
        - name: app
          image: docker.io/library/nginx:1.27-alpine
          ports:
            - containerPort: 80
