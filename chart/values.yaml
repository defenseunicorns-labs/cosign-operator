imagePullSecrets: []
additionalIgnoredNamespaces:
  - 'pepr-system'
  - 'kube-sytem'
  - 'istio-system'
  - 'zarf'
rbac:
  - apiGroups:
    - ""
    resources:
    - secrets
    verbs:
    - get
  - apiGroups:
    - "policy.uds.dev"
    resources:
      - signatureenforcements
      - sbomenforcements
    verbs: 
    - get
    - list
    - watch
secrets:
  apiPath: 'MTg1ZjMwMDk4ODU1MGRiY2RmNjFiYTkzYmMxMmZhN2ZjNTRlOWJkMzdhMTM5OGI4ZTk4Njc0YjQ5NTI0ZDcxMA=='
hash: 'e48383dbca396c57ad9337b5f39bac61d3532328a43b2e54a87c4e60c686258a'
namespace:
  annotations: {}
  labels:
    pepr.dev: ''
uuid: 'pepr-image-signature-policy'
admission:
  enabled: true
  antiAffinity: false
  terminationGracePeriodSeconds: 5
  failurePolicy: 'Fail'
  env:
    - name: 'PEPR_PRETTY_LOG'
      value: 'false'
    - name: 'LOG_LEVEL'
      value: 'info'
  envFrom: []
  image: 'ghcr.io/defenseunicorns/pepr/controller:v1.1.5'
  annotations:
    pepr.dev/description: 'Pepr policy that enforces cosign image signature verification'
  labels:
    app: 'pepr-image-signature-policy'
    pepr.dev/controller: 'admission'
    pepr.dev/uuid: 'image-signature-policy'
  securityContext:
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    fsGroup: 65532
  readinessProbe:
    httpGet:
      path: '/healthz'
      port: 3000
      scheme: 'HTTPS'
    initialDelaySeconds: 10
  livenessProbe:
    httpGet:
      path: '/healthz'
      port: 3000
      scheme: 'HTTPS'
    initialDelaySeconds: 10
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  containerSecurityContext:
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - 'ALL'
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  extraVolumeMounts:
  - name: cosign-key
    mountPath: /etc/cosign
    readOnly: true
  extraVolumes:
  - name: cosign-keys
    secret:
      secretName: cosign-public-key
  affinity: {}
  serviceMonitor:
    enabled: false
    labels: {}
    annotations: {}
watcher:
  enabled: true
  terminationGracePeriodSeconds: 5
  env:
    - name: 'PEPR_PRETTY_LOG'
      value: 'false'
    - name: 'LOG_LEVEL'
      value: 'info'
  envFrom: []
  image: 'ghcr.io/defenseunicorns/pepr/controller:v1.1.5'
  annotations:
    pepr.dev/description: 'Pepr policy that enforces cosign image signature verification'
  labels:
    app: 'pepr-image-signature-policy-watcher'
    pepr.dev/controller: 'watcher'
    pepr.dev/uuid: 'image-signature-policy'
  securityContext:
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    fsGroup: 65532
  readinessProbe:
    httpGet:
      path: '/healthz'
      port: 3000
      scheme: 'HTTPS'
    initialDelaySeconds: 10
  livenessProbe:
    httpGet:
      path: '/healthz'
      port: 3000
      scheme: 'HTTPS'
    initialDelaySeconds: 10
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  containerSecurityContext:
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - 'ALL'
  nodeSelector: {}
  tolerations: []
  extraVolumeMounts: []
  extraVolumes: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  serviceMonitor:
    enabled: false
    labels: {}
    annotations: {}
