apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-signed-app
  namespace: ###ZARF_VAR_NAMESPACE###
spec:
  replicas: 1
  selector:
    matchLabels:
      app: e2e-signed-app
  template:
    metadata:
      labels:
        app: e2e-signed-app
    spec:
      containers:
        - name: app
          image: "###ZARF_CONST_IMAGE###"
          ports:
            - containerPort: 8080
