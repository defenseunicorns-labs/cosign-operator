name: CI

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd policy && npm ci

      - name: Run unit tests
        run: cd policy && npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xz crane
          sudo mv crane /usr/local/bin/

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Zarf
        uses: zarf-dev/setup-zarf@10e539efed02f75ec39eb8823e22a5c795f492ae #v1.0.1
        with:
          download-init-package: true

      - name: Install UDS CLI
        run: |
          curl -sL https://github.com/defenseunicorns/uds-cli/releases/latest/download/uds-cli_Linux_amd64 -o uds
          chmod +x uds
          sudo mv uds /usr/local/bin/

      - name: Install dependencies
        run: cd policy && npm ci && cd .. && npm ci

      - name: Generate cosign keys
        run: COSIGN_PASSWORD="" cosign generate-key-pair

      - name: Build policy and Zarf package
        run: |
          make build-policy
          zarf package create . --confirm --skip-sbom

      - name: Create UDS bundle
        run: cd bundle && uds create --confirm

      - name: Create k3d cluster
        run: k3d cluster create

      - name: Deploy UDS bundle
        run: uds deploy bundle/uds-bundle-image-signature-policy-amd64-0.0.1.tar.zst --confirm

      - name: Setup e2e
        run: make setup-e2e

      - name: Run e2e tests
        run: make test-e2e
