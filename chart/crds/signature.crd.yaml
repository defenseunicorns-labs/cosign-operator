apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: signatureenforcements.policy.uds.dev
spec:
  group: policy.uds.dev
  scope: Cluster
  names:
    plural: signatureenforcements
    singular: signatureenforcement
    kind: SignatureEnforcement
    shortNames:
      - sig
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - namespaces
                - enforcementPolicy
              properties:
                namespaces:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    minLength: 1
                  x-kubernetes-validations:
                    - rule: "self.all(ns, ns != 'pepr-system' && ns != 'istio-system' && ns != 'zarf' && ns != 'kube-system')"
                      message: "namespaces cannot include pepr-system, istio-system, zarf, or kube-system"
                enforcementPolicy:
                  type: object
                  required:
                    - mode
                  properties:
                    mode:
                      type: string
                      enum:
                        - enforce
                        - warn