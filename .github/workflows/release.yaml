name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  # ---------------------------------------------------------------------------
  # release-please creates/updates a release PR with changelog, and when
  # that PR is merged it creates a GitHub Release + git tag.
  # ---------------------------------------------------------------------------
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ---------------------------------------------------------------------------
  # After release-please creates a release, build and push to GHCR.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Zarf
        uses: defenseunicorns/setup-zarf@main

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | zarf tools registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Render zarf.yaml with release version
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          envsubst < zarf.yaml.tmpl.release > zarf.yaml
          cat zarf.yaml

      - name: Create Zarf package
        run: |
          zarf package create . --confirm

      - name: Publish Zarf package to GHCR
        run: |
          zarf package publish zarf-package-*.tar.zst \
            oci://ghcr.io/${{ github.repository_owner }} \
            --oci-concurrency 6